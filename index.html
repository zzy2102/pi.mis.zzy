<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树莓派电机监控面板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .data-item {
            margin: 20px 0;
            font-size: 18px;
        }
        .label {
            font-weight: bold;
            color: #333;
        }
        .value {
            color: #007bff;
            font-size: 24px;
            margin-left: 10px;
        }
        .status-forward { color: #28a745; }
        .status-backward { color: #dc3545; }
        .status-stop { color: #6c757d; }
        .refresh {
            margin-top: 30px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>📊 树莓派电机实时数据</h1>
        <div class="data-item">
            <span class="label">电机状态：</span>
            <span id="status" class="value status-stop">加载中...</span>
        </div>
        <div class="data-item">
            <span class="label">电机转速：</span>
            <span id="speed" class="value">加载中...</span> %
        </div>
        <div class="data-item">
            <span class="label">电压：</span>
            <span id="voltage" class="value">加载中...</span> V
        </div>
        <div class="data-item">
            <span class="label">最后更新时间：</span>
            <span id="timestamp" class="value">加载中...</span>
        </div>
        <button class="refresh" onclick="fetchMotorData()">🔄 手动刷新</button>
    </div>

    <script>
        // 树莓派 API 地址（已替换为你的树莓派 IP）
        const API_URL = "http://192.168.1.122:5000/api/motor";

        function fetchMotorData() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    // 更新页面数据
                    document.getElementById('status').textContent = data.status;
                    document.getElementById('speed').textContent = data.speed;
                    document.getElementById('voltage').textContent = data.voltage;
                    document.getElementById('timestamp').textContent = data.timestamp;
                    
                    // 根据状态切换颜色
                    const statusEl = document.getElementById('status');
                    statusEl.className = "value";
                    if (data.status === "forward") {
                        statusEl.classList.add("status-forward");
                    } else if (data.status === "backward") {
                        statusEl.classList.add("status-backward");
                    } else {
                        statusEl.classList.add("status-stop");
                    }
                })
                .catch(error => {
                    console.error("获取数据失败：", error);
                    alert("获取数据失败，请检查网页和树莓派是否在同一局域网");
                });
        }

        // 页面加载时自动获取数据，每3秒自动刷新
        window.onload = () => {
            fetchMotorData();
            setInterval(fetchMotorData, 3000);
        };
    </script>
</body>
</html>
