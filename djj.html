<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树莓派电机监控面板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .data-item {
            margin: 20px 0;
            font-size: 18px;
        }
        .label {
            font-weight: bold;
            color: #333;
        }
        .value {
            color: #007bff;
            font-size: 24px;
            margin-left: 10px;
        }
        .status-forward { color: #28a745; }
        .status-backward { color: #dc3545; }
        .status-stop { color: #6c757d; }
        .refresh {
            margin-top: 30px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>📊 树莓派电机实时数据</h1>
        <div class="data-item">
            <span class="label">电机状态：</span>
            <span id="status" class="value status-stop">加载中...</span>
        </div>
        <div class="data-item">
            <span class="label">电机转速：</span>
            <span id="speed" class="value">加载中...</span> %
        </div>
        <div class="data-item">
            <span class="label">电压：</span>
            <span id="voltage" class="value">加载中...</span> V
        </div>
        <div class="data-item">
            <span class="label">最后更新时间：</span>
            <span id="timestamp" class="value">加载中...</span>
        </div>
        <button class="refresh" onclick="fetchMotorData()">🔄 手动刷新</button>
    </div>

    <!-- 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>

    <script>
        // 完整的 Firebase 配置（已替换为你的真实信息）
        const firebaseConfig = {
            apiKey: "AIzaSyAMo57I_rkuBwG-H3A26yLyoau6hkgNWxI",
            authDomain: "mis-zzy.firebaseapp.com",
            databaseURL: "https://mis-zzy.firebaseio.com",
            projectId: "mis-zzy",
            storageBucket: "mis-zzy.firebasestorage.app",
            messagingSenderId: "523598761990",
            appId: "1:523598761990:web:1da1af1a58b08f5989f387",
            measurementId: "G-KJTBZJW8X5"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const motorRef = database.ref('raspberry_pi/motor');

        // 匿名登录（获取读取权限）
        auth.signInAnonymously().catch(error => {
            console.error("登录失败：", error);
            alert("数据加载失败，请检查网络或 Firebase 配置");
        });

        // 实时获取电机数据
        function fetchMotorData() {
            motorRef.once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    // 更新页面数据
                    document.getElementById('status').textContent = data.status;
                    document.getElementById('speed').textContent = data.speed;
                    document.getElementById('voltage').textContent = data.voltage;
                    document.getElementById('timestamp').textContent = data.timestamp;
                    
                    // 根据状态切换颜色
                    const statusEl = document.getElementById('status');
                    statusEl.className = "value"; // 重置样式
                    if (data.status === "forward") {
                        statusEl.classList.add("status-forward");
                    } else if (data.status === "backward") {
                        statusEl.classList.add("status-backward");
                    } else {
                        statusEl.classList.add("status-stop");
                    }
                } else {
                    alert("暂无电机数据，请先运行树莓派模拟程序");
                }
            }).catch(error => {
                console.error("获取数据失败：", error);
                alert("获取数据失败：" + error.message);
            });
        }

        // 页面加载时自动获取数据，且实时监听变化
        window.onload = () => {
            fetchMotorData();
            // 实时监听数据变化（无需手动刷新）
            motorRef.on('value', snapshot => {
                const data = snapshot.val();
                if (data) fetchMotorData();
            });
        };
    </script>
</body>
</html>
